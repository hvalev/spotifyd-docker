# paths-ignore are not respected on PRs. For now this will run along with the nightly
# https://github.com/actions/runner/issues/2324
name: ci
on:
  push:
    paths-ignore:
      - 'README.md'
      - 'spotifyd-hash.txt'
    branches:
      - '**'

jobs:
  buildx:
    runs-on: self-hosted
    timeout-minutes: 4320
    steps:
      - name: Mask Cache Registry Secrets
        run: |
          echo "::add-mask::$CACHE_REGISTRY_URL"
          echo "::add-mask::$CACHE_REGISTRY_USERNAME"
          echo "::add-mask::$CACHE_REGISTRY_PASSWORD"
          echo "CACHE_REGISTRY_URL=$CACHE_REGISTRY_URL" >> $GITHUB_ENV
          echo "CACHE_REGISTRY_USERNAME=$CACHE_REGISTRY_USERNAME" >> $GITHUB_ENV
          echo "CACHE_REGISTRY_PASSWORD=$CACHE_REGISTRY_PASSWORD" >> $GITHUB_ENV

      - name: Free Disk Space
        uses: ShubhamTatvamasi/free-disk-space-action@master
      
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get Version
        id: get_version
        uses: dhkatz/get-version-action@v3.0.0

      - name: Read Spotifyd Version
        id: read_version
        run: |
          VERSION=$(cat spotifyd-version.txt)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Spotifyd Version: $VERSION"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4
        with:
          buildkitd-config-inline: |
            [registry."${{ env.CACHE_REGISTRY_URL }}"]
              http = true

      - name: Available platforms
        run: echo ${{ steps.buildx.outputs.platforms }}

      - name: Login to Cache Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.CACHE_REGISTRY_URL }}
          username: ${{ env.CACHE_REGISTRY_USERNAME }}
          password: ${{ env.CACHE_REGISTRY_PASSWORD }}

      - name: Build alsa
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm/v7,linux/arm64,linux/386,linux/amd64
          target: alsa-release
          cache-from: type=registry,ref=${{ env.CACHE_REGISTRY_URL }}/spotifyd-cache:buildcache
          cache-to: type=registry,ref=${{ env.CACHE_REGISTRY_URL }}/spotifyd-cache:buildcache,mode=max
          build-args: |
            VERSION=${{ env.VERSION }}

      - name: Build alsa-dbus
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm/v7,linux/arm64,linux/386,linux/amd64
          target: alsa-dbus-release
          cache-from: type=registry,ref=${{ env.CACHE_REGISTRY_URL }}/spotifyd-cache:buildcache
          cache-to: type=registry,ref=${{ env.CACHE_REGISTRY_URL }}/spotifyd-cache:buildcache,mode=max
          build-args: |
            VERSION=${{ env.VERSION }}

      - name: Build pulseaudio
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm/v7,linux/arm64,linux/386,linux/amd64
          target: pulseaudio-release
          cache-from: type=registry,ref=${{ env.CACHE_REGISTRY_URL }}/spotifyd-cache:buildcache
          cache-to: type=registry,ref=${{ env.CACHE_REGISTRY_URL }}/spotifyd-cache:buildcache,mode=max
          build-args: |
            VERSION=${{ env.VERSION }}

      - name: Build pulseaudio-dbus
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm/v7,linux/arm64,linux/386,linux/amd64
          target: pulseaudio-dbus-release
          cache-from: type=registry,ref=${{ env.CACHE_REGISTRY_URL }}/spotifyd-cache:buildcache
          cache-to: type=registry,ref=${{ env.CACHE_REGISTRY_URL }}/spotifyd-cache:buildcache,mode=max
          build-args: |
            VERSION=${{ env.VERSION }}
